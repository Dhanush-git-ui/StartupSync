<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradient for background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for compass needle -->
    <linearGradient id="needleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)"/>
  
  <!-- Inner glow effect -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
  
  <!-- Compass outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
  
  <!-- Direction markers (simplified) -->
  <path d="M 50 12 L 50 18" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 50 82 L 50 88" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 12 50 L 18 50" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <path d="M 82 50 L 88 50" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Compass needle (diamond shape) - pointing NE for growth/direction -->
  <path d="M 50 50 L 70 30 L 50 50 L 30 70 Z" fill="white" opacity="0.9"/>
  <path d="M 50 50 L 70 30 L 50 50 Z" fill="url(#needleGradient)"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="white" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- AI/tech sparkles -->
  <circle cx="72" cy="28" r="2" fill="white" opacity="0.8"/>
  <circle cx="28" cy="72" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="75" cy="70" r="1" fill="white" opacity="0.7"/>
  <circle cx="25" cy="30" r="1" fill="white" opacity="0.5"/>
</svg>
